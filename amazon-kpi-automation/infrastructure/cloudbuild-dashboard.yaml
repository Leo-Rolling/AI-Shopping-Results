steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/amazon-kpi-dashboard:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/amazon-kpi-dashboard:latest'
      - '-f'
      - 'docker/Dockerfile.streamlit'
      - '.'

  # Push the image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/amazon-kpi-dashboard'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'amazon-kpi-dashboard'
      - '--image=gcr.io/$PROJECT_ID/amazon-kpi-dashboard:$SHORT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=1800'
      - '--concurrency=1'
      - '--port=8501'
      - '--no-allow-unauthenticated'
      - '--service-account=amazon-kpi-runner@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GCP_PROJECT_ID=$PROJECT_ID,USE_ENV_SECRETS=false'

images:
  - 'gcr.io/$PROJECT_ID/amazon-kpi-dashboard'

options:
  logging: CLOUD_LOGGING_ONLY
